<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CONJOAAD 2026 — Átrios de Adoração</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#f1c40f; --bg:#f8f9f5; --marrom:#85550d; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:'Inter',sans-serif;color:#333;text-align:center;padding:20px 0}
  nav{background:var(--accent);padding:14px 0;position:sticky;top:0;z-index:100}
  nav a{color:#fff;text-decoration:none;font-family:'Cinzel',serif;font-weight:700;font-size:19px}
  nav .logo{height:50px;vertical-align:middle}
  h1{font-family:'Cinzel',serif;font-size:38px;color:var(--marrom);margin:20px 0 8px}
  h2{font-family:'Cinzel',serif;font-size:24px;color:#4b2f04;margin-bottom:20px}
  .gallery-wrap{max-width:1100px;margin:0 auto;padding:20px 0}
  .grid{
    display:grid;
    gap:20px;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    justify-items:center;
  }
  .item{
    position:relative;
    width:140px;
    height:250px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.22);
    cursor:pointer;
    background:#000;
  }
  .item img, .item video{
    width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;
  }
  .item:hover img, .item:hover video{transform:scale(1.08)}
  .play{
    position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.75);color:#fff;padding:9px 18px;border-radius:30px;
    font-weight:800;font-size:14px;backdrop-filter:blur(10px);z-index:2;
  }
  .lightbox{
    position:fixed;inset:0;background:rgba(0,0,0,0.97);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:999;opacity:0;visibility:hidden;transition:opacity .3s;
  }
  .lightbox.open{opacity:1;visibility:visible}
  .lb-media{max-width:90%;max-height:80vh;object-fit:contain;border-radius:20px;box-shadow:0 15px 50px rgba(0,0,0,0.7);}
  .download-btn{
    margin-top:25px;background:var(--marrom);color:#fff;padding:16px 40px;
    border-radius:50px;font-weight:800;font-size:19px;text-decoration:none;
    display:inline-block;box-shadow:0 12px 35px rgba(75,47,4,0.4);transition:all .3s;
  }
  .download-btn:hover{transform:translateY(-6px);background:#3a2003}
  .lb-close{
    position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.15);
    color:#fff;border:none;padding:12px 18px;border-radius:50%;font-size:30px;cursor:pointer;z-index:10;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html">Início</a>
  <img src="AD JOAQUIM GOMES.png" alt="Logo" class="logo">
</nav>

<h1>CONJOAAD 2026</h1>
<h2></h2>
<p style="max-width:900px;margin:0 auto 35px;font-size:18px;color:#444;line-height:1.7;">
  
</p>

<div class="gallery-wrap">
  <div class="grid" id="gallery"></div>
</div>

<div id="lightbox" class="lightbox">
  <button class="lb-close">×</button>
  <img id="lbImg" class="lb-media" src="" alt="" style="display:none">
  <video id="lbVideo" class="lb-media" controls autoplay style="display:none"></video>
  <a id="downloadBtn" class="download-btn" href="" download>BAIXAR AGORA</a>
</div>

<!-- ARQUIVOS DO CONGRESSO JOVEM 2026 -->
<div id="media-source" style="display:none">
  <div class="item" data-type="image" data-src="CONJOAD/CONJOADITAS.jpg"></div>
  <div class="item" data-type="video" data-src="CONJOAD/CON-video.mp4"></div>
  <div class="item" data-type="image" data-src="CONJOAD/CORDENACAO.jpg"></div>
  <div class="item" data-type="video" data-src="CONJOAD/COR-video.mp4"></div>
  <div class="item" data-type="image" data-src="CONJOAD/MIDIA.jpg"></div>
  <div class="item" data-type="video" data-src="CONJOAD/MID-video.mp4"></div>
  <div class="item" data-type="image" data-src="CONJOAD/APOIO.jpg"></div>
  <div class="item" data-type="video" data-src="CONJOAD/APO-video.mp4"></div>
  <div class="item" data-type="image" data-src="CONJOAD/ESPECIAL(VISITANTE).jpg"></div>
  <div class="item" data-type="video" data-src="CONJOAD/ESP-video.mp4"></div>
  <div class="item" data-type="image" data-src="CONJOAD/LIBRAS.jpg"></div>
  <div class="item" data-type="video" data-src="CONJOAD/LIB-video.mp4"></div>
  <!-- Adicione mais se precisar -->
</div>

<script>
// CRIA AS MINIATURAS
document.querySelectorAll('#media-source .item').forEach(item => {
  const div = document.createElement('div');
  div.className = 'item';
  div.dataset.type = item.dataset.type;
  div.dataset.src = item.dataset.src;

  if (item.dataset.type === 'video') {
    const video = document.createElement('video');
    video.src = item.dataset.src;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.autoplay = true;
    video.preload = "auto";
    video.style.objectFit = "cover";
    video.setAttribute("playsinline", "");
    video.setAttribute("webkit-playsinline", "");
    video.play().catch(() => {});

    div.appendChild(video);
    const playBtn = document.createElement('div');
    playBtn.className = 'play';
    playBtn.textContent = 'Play';
    div.appendChild(playBtn);
  } else {
    const img = document.createElement('img');
    img.src = item.dataset.src;
    img.loading = "lazy";
    div.appendChild(img);
  }
  document.getElementById('gallery').appendChild(div);
});

// FORÇA OS VÍDEOS A RODAREM (funciona em TODOS os celulares)
setTimeout(() => {
  document.querySelectorAll('#gallery video').forEach(v => {
    v.play().catch(() => {});
  });
}, 600);

// LIGHTBOX + DOWNLOAD
document.querySelectorAll('#gallery .item').forEach(item => {
  item.addEventListener('click', () => {
    const src = item.dataset.src;
    const filename = src.split('/').pop();

    document.getElementById('downloadBtn').href = src;
    document.getElementById('downloadBtn').download = filename;

    if (item.dataset.type === 'video') {
      document.getElementById('lbImg').style.display = 'none';
      const v = document.getElementById('lbVideo');
      v.src = src;
      v.style.display = 'block';
      v.muted = false;
      v.play();
    } else {
      document.getElementById('lbVideo').style.display = 'none';
      document.getElementById('lbVideo').pause();
      document.getElementById('lbImg').src = src;
      document.getElementById('lbImg').style.display = 'block';
    }
    document.getElementById('lightbox').classList.add('open');
  });
});

// FECHAR LIGHTBOX
document.querySelector('.lb-close').onclick = () => {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbVideo').pause();
  document.getElementById('lbVideo').src = '';
};

document.getElementById('lightbox').onclick = (e) => {
  if (e.target.id === 'lightbox') {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lbVideo').pause();
    document.getElementById('lbVideo').src = '';
  }
};
</script>
</body>
</html>
