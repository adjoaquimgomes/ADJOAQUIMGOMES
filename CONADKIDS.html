/* ===== DOUBLE-TAP HEART ===== */
.dt-heart {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:90px; pointer-events:none; z-index:30;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,0.5));
  opacity:0;
}
.dt-heart.pop { animation:heartPop .75s cubic-bezier(.17,.89,.32,1.49) forwards; }
@keyframes heartPop {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:0; }
  15%  { opacity:1; }
  40%  { transform:translate(-50%,-50%) scale(1.25); opacity:1; }
  65%  { transform:translate(-50%,-50%) scale(0.95); opacity:1; }
  80%  { transform:translate(-50%,-50%) scale(1.05); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.1); opacity:0; }
}

function renderGrid(containerId, items, isVideo) {
  const container = document.getElementById(containerId)
  container.innerHTML = ''
  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><span class="icon">${isVideo?'🎬':'📷'}</span><p>Nenhum ${isVideo?'vídeo':'foto'} publicado ainda.</p></div>`
    return
  }
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return
      const el = entry.target, src = el.dataset.src
      if (!src) return
      if (el.tagName === 'VIDEO') { el.src = src + '#t=1'; el.setAttribute('poster', src + '#t=1'); el.load() }
      else { el.src = src }
      obs.unobserve(el)
    })
  }, { rootMargin: '300px' })
  items.forEach(item => {
    const div = document.createElement('div')
    div.className = 'grid-item'
    div.onclick = () => { if (!currentUser) { showLoginPrompt(); return } openModal(item.id, isVideo) }
    const isMulti = !isVideo && item.images?.length > 1
    const thumb = isVideo ? item.url : (item.images?.[0] || item.url)
    if (isVideo) {
      div.innerHTML = `<video data-src="${thumb}" preload="none" muted playsinline></video><div class="grid-icon">▶</div>`
      obs.observe(div.querySelector('video'))
    } else {
      div.innerHTML = `<img data-src="${thumb}" alt="" decoding="async" onerror="this.style.display='none';this.parentElement.style.background='#d6f0ff'">${isMulti?'<div class="grid-icon">❐</div>':''}`
      obs.observe(div.querySelector('img'))
    }
    container.appendChild(div)
  })
}

      if (isVertical) {
        const wrapper = vid.closest('.modal-video-wrapper')

          if (wrapper) { wrapper.style.aspectRatio = vid.videoWidth + '/' + vid.videoHeight; wrapper.style.width = '100%'; wrapper.style.height = 'auto' }

        vid.style.width = '100%'; vid.style.height = '100%'; vid.style.objectFit = 'cover'

    }

        <button class="action-btn" onclick="toggleComments('${id}',${isVideo})">💬 <span class="cc" data-id="${id}">0</span></button>
      </div>
      <div class="liked-by" id="liked-by-${id}" onclick="openLikesList('${id}')"></div>
    </div>
    <div class="comment-input">
      <input type="text" id="mi-${id}" placeholder="${currentUser?'Adicione um comentário...':'Faça login para comentar'}" ${dis}>
      <button onclick="submitComment('${id}',${isVideo})" ${dis}>Publicar</button>

  modal.classList.add('open')

  if (_likesCache[id]) {

    const { data: comms } = await supabase.from('comments')

      .eq('post_id', id).order('created_at', {ascending:true})
    scroll.innerHTML = comms?.length ? comms.map(c => `
      <div class="comment">
        <img src="${c.profiles?.avatar||''}" class="comment-avatar" onerror="this.src='https://via.placeholder.com/28'" alt="">
        <div class="comment-body">
          <div class="comment-header">

          </div>
          <div class="comment-text">${c.content}</div>
        </div>
      </div>`).join('')
      : '<p style="font-size:12px;color:#bbb;text-align:center;padding:20px">Seja o primeiro a comentar!</p>'
    scroll.scrollTop = scroll.scrollHeight
    document.querySelectorAll(`.cc[data-id="${id}"]`).forEach(el => el.textContent = comms?.length||0)
  } catch(e) { scroll.innerHTML = '<p style="text-align:center;color:#bbb;padding:20px">Erro ao carregar.</p>' }

  if (!text) return
  if (!currentUser) { showLoginPrompt(); return }
  input.value = ''
  try {
    await supabase.from('comments').insert({post_id:id, user_id:currentUser.id, content:text})
    setTimeout(() => loadDrawerComments(id, isVideo), 300)
    setTimeout(() => syncInteractions(id, isVideo), 500)
  } catch(e) { alert('Erro ao comentar') }
}

document.getElementById('drawer-comment-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitDrawerComment()
})

window.closeModal = () => {
  modal.classList.remove('open')
  document.body.style.overflow = ''
  modalMedia.querySelector('video')?.pause()
  modalMedia.innerHTML = ''
  modalScroll.innerHTML = ''

  if (box) { box.style.width = ''; box.style.transform = ''; box.style.transition = '' }
}
window.closeModalOutside = e => { if (e.target === modal) closeModal() }

  document.getElementById('modal').addEventListener('touchend', async (e) => {

      if (!currentUser) { showLoginPrompt(); return }
      showHeartAnim(document.getElementById('modal-media'))
      doLike(_swipeCurId, _swipeCurIsVideo)
    } else {
      lastTap = now
    }
  }, { passive: true })

  document.getElementById('modal').addEventListener('dblclick', async (e) => {
    if (!e.target.closest('#modal-media')) return
    if (!currentUser) { showLoginPrompt(); return }
    showHeartAnim(document.getElementById('modal-media'))
    doLike(_swipeCurId, _swipeCurIsVideo)

})()
let _swipeCurId = null, _swipeCurIsVideo = false
;(()=>{
  let startY = 0, isDragging = false
  const box = () => document.getElementById('modal-box')
  modal.addEventListener('touchstart', e => {
    if (window.innerWidth >= 900) return
    if (e.target.closest('.carousel-wrapper')) return
    startY = e.touches[0].clientY; isDragging = true
    const b = box(); if (b) b.style.transition = 'none'
  }, {passive:true})
  modal.addEventListener('touchmove', e => {
    if (!isDragging || window.innerWidth >= 900) return
    if (e.target.closest('.carousel-wrapper')) return
    const b = box(); if (b) b.style.transform = `translateY(${e.touches[0].clientY - startY}px)`
  }, {passive:true})
  modal.addEventListener('touchend', e => {
    if (!isDragging || window.innerWidth >= 900) return
    if (e.target.closest('.carousel-wrapper')) return
    isDragging = false
    const dy = e.changedTouches[0].clientY - startY, b = box()
    if (Math.abs(dy) < 80) { if (b) { b.style.transition = 'transform .3s ease'; b.style.transform = '' }; return }
    const list = _swipeCurIsVideo ? allReels : allPosts
    const idx = list.findIndex(x => x.id == _swipeCurId)
    let nextIdx = dy < 0 ? idx + 1 : idx - 1
    if (nextIdx < 0 || nextIdx >= list.length) { if (b) { b.style.transition = 'transform .3s ease'; b.style.transform = '' }; return }
    if (b) { b.style.transition = 'transform .25s ease'; b.style.transform = `translateY(${dy < 0 ? '-110%' : '110%'})` }
    setTimeout(() => {
      openModal(list[nextIdx].id, _swipeCurIsVideo)
      const nb = box()
      if (nb) { nb.style.transition = 'none'; nb.style.transform = `translateY(${dy < 0 ? '110%' : '-110%'})`; requestAnimationFrame(() => { requestAnimationFrame(() => { nb.style.transition = 'transform .3s ease'; nb.style.transform = '' }) }) }
    }, 250)
  }, {passive:true})
})()

window.mNext = (id, total) => { carouselStates[id]=(carouselStates[id]+1)%total; updC(id,total) }
window.mPrev = (id, total) => { carouselStates[id]=(carouselStates[id]-1+total)%total; updC(id,total) }
function updC(id, total) { const cc=document.getElementById(`mcc-${id}`),ind=document.getElementById(`mind-${id}`),idx=carouselStates[id]; if(cc)cc.style.transform=`translateX(-${idx*100}%)`; if(ind)ind.textContent=`${idx+1}/${total}` }
function initSwipe(id, total) {
  const wrap=document.getElementById(`mcw-${id}`),cc=document.getElementById(`mcc-${id}`)
  if(!wrap)return
  let startX=0,startY=0,isDragging=false
  wrap.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;isDragging=true;cc.style.transition='none'},{passive:true})
  wrap.addEventListener('touchmove',e=>{if(!isDragging)return;const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;if(Math.abs(dy)>Math.abs(dx))return;e.preventDefault();cc.style.transform=`translateX(${carouselStates[id]*-wrap.clientWidth+dx}px)`},{passive:false})
  wrap.addEventListener('touchend',e=>{if(!isDragging)return;isDragging=false;cc.style.transition='transform .35s cubic-bezier(.25,.1,.25,1)';const dx=e.changedTouches[0].clientX-startX,threshold=wrap.clientWidth*0.25;if(dx>threshold)carouselStates[id]=Math.max(0,carouselStates[id]-1);else if(dx<-threshold)carouselStates[id]=Math.min(total-1,carouselStates[id]+1);updC(id,total)},{passive:true})
}

async function prefetchUserLikes() {
  if (!currentUser) return
  try {
    const allIds = [...allPosts, ...allReels].map(m => m.id)
    const { data } = await supabase.from('likes').select('post_id').eq('user_id', currentUser.id).in('post_id', allIds)
    const likedIds = new Set((data||[]).map(l => l.post_id))
    allIds.forEach(id => {
      if (!_likesCache[id]) _likesCache[id] = { totalCount: 0, liked: likedIds.has(id), likesRaw: [] }
      else _likesCache[id].liked = likedIds.has(id)
    })
  } catch(e) {}
}

function prefetchNextVideo(id) {
  const list = allReels
  const idx = list.findIndex(x => x.id == id)
  const next = list[idx + 1]
  if (!next || next.type !== 'video') return
  if (document.querySelector(`link[href="${next.url}"]`)) return
  const link = document.createElement('link')
  link.rel = 'prefetch'
  link.as = 'video'
  link.href = next.url
  document.head.appendChild(link)
}

function subscribeRT(id, isVideo) {
  const k=`m-${id}`; if(channels[k])return
  channels[k]=supabase.channel(`rt-m-${id}`).on('postgres_changes',{event:'*',schema:'public',table:'likes',filter:`post_id=eq.${id}`},()=>syncInteractions(id,isVideo)).on('postgres_changes',{event:'*',schema:'public',table:'comments',filter:`post_id=eq.${id}`},()=>syncInteractions(id,isVideo)).subscribe()
}

async function syncInteractions(id, isVideo) {
  try {
    const [countRes, likesRes, commsRes, myLikeRes] = await Promise.all([
      supabase.from('likes').select('*',{count:'exact',head:true}).eq('post_id',id),
      supabase.from('likes').select('user_id,profiles(username,avatar)').eq('post_id',id).limit(3),
      supabase.from('comments').select('id,content,user_id,created_at,profiles(username,avatar)').eq('post_id',id).order('created_at',{ascending:true}),
      currentUser ? supabase.from('likes').select('id').eq('post_id',id).eq('user_id',currentUser.id).maybeSingle() : Promise.resolve({data:null})
    ])
    const totalCount = countRes.count || 0
    const likesRaw   = likesRes.data || []
    const comms      = commsRes.data || []
    const liked      = !!myLikeRes.data
    _likesCache[id] = { totalCount, liked, likesRaw }
    if (!lockingLikes.has(id)) {
      const btn = document.getElementById(`btn-like-${id}`)
      if (btn) {
        btn.innerHTML = `<span>${liked?'❤️':'♡'}</span><span class="lc" data-id="${id}">${totalCount}</span>`
        btn.classList.toggle('liked', liked)
      }
      document.querySelectorAll(`.lc[data-id="${id}"]`).forEach(el => el.textContent = totalCount)
    }
    const likedByEl = document.getElementById(`liked-by-${id}`)
    if (likedByEl) {
      if (likesRaw.length) {
        const avatars = likesRaw.map(p => `<img src="${p.profiles?.avatar||''}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.profiles?.username||'?')}&background=4bb4f2&color=fff&size=32'" alt="">`).join('')
        const names   = likesRaw.slice(0,2).map(p => `<strong>${p.profiles?.username?.split(' ')[0]||'Alguém'}</strong>`).join(' e ')
        const extra   = totalCount > 2 ? ` e outras <strong>${totalCount-2}</strong> pessoas` : ''
        likedByEl.innerHTML = `<div class="liked-by-avatars">${avatars}</div><div class="liked-by-text">Curtido por ${names}${extra} <span style="color:var(--blue2)">› ver lista</span></div>`
      } else { likedByEl.innerHTML = '' }
    }
    const sec = document.getElementById(`mc-${id}`)
    if (sec) {
      sec.innerHTML = comms.length ? comms.map(cm=>`<div class="comment"><img src="${cm.profiles?.avatar||''}" class="comment-avatar" onerror="this.src='https://via.placeholder.com/28'" alt=""><div class="comment-body"><div class="comment-header"><span class="comment-username">${cm.profiles?.username||'Anônimo'}</span>${currentUser&&cm.user_id===currentUser.id?`<button class="comment-delete-btn" onclick="deleteComment('${cm.id}','${id}',${isVideo})">🗑</button>`:''}</div><div class="comment-text">${cm.content}</div></div></div>`).join('') : '<p style="font-size:12px;color:#bbb;text-align:center;padding:10px">Seja o primeiro a comentar!</p>'
      sec.scrollTop = sec.scrollHeight
    }
    document.querySelectorAll(`.cc[data-id="${id}"]`).forEach(el => el.textContent = comms.length)
    if (document.getElementById('comments-drawer')?.classList.contains('open') && window._drawerCurId == id) loadDrawerComments(id, isVideo)
  } catch(err) { console.error('Erro sync:',err) }
}

      const names   = likesRaw.slice(0,2).map(p => `<strong>${p.profiles?.username?.split(' ')[0]||'Alguém'}</strong>`).join(' e ')
      const extra   = totalCount > 2 ? ` e outras <strong>${totalCount-2}</strong> pessoas` : ''
      likedByEl.innerHTML = `<div class="liked-by-avatars">${avatars}</div><div class="liked-by-text">Curtido por ${names}${extra} <span style="color:var(--blue2)">› ver lista</span></div>`
    }

      sec.innerHTML = comms.length ? comms.map(cm=>`<div class="comment"><img src="${cm.profiles?.avatar||''}" class="comment-avatar" onerror="this.src='https://via.placeholder.com/28'" alt=""><div class="comment-body"><div class="comment-header"><span class="comment-username">${cm.profiles?.username||'Anônimo'}</span>${currentUser&&cm.user_id===currentUser.id?`<button class="comment-delete-btn" onclick="deleteComment('${cm.id}','${id}',${isVideo})">🗑</button>`:''}</div><div class="comment-text">${cm.content}</div></div></div>`).join('') : '<p style="font-size:12px;color:#bbb;text-align:center;padding:10px">Seja o primeiro a comentar!</p>'
      sec.scrollTop = sec.scrollHeight

    if (document.getElementById('comments-drawer')?.classList.contains('open') && window._drawerCurId == id) loadDrawerComments(id, isVideo)
  } catch(err) {}

window.openLikesList = async(postId) => {
  const overlay=document.getElementById('likes-list-overlay'),scroll=document.getElementById('likes-list-scroll')
  scroll.innerHTML='<div class="likes-list-empty">Carregando...</div>'
  overlay.classList.add('open')
  try{
    const{data:likesRaw}=await supabase.from('likes').select('user_id').eq('post_id',postId)
    if(!likesRaw?.length){scroll.innerHTML='<div class="likes-list-empty">Nenhuma curtida ainda.</div>';return}
    const uids=likesRaw.map(l=>l.user_id)
    const{data:profs}=await supabase.from('profiles').select('id,username,avatar').in('id',uids)
    if(!profs?.length){scroll.innerHTML='<div class="likes-list-empty">Nenhum perfil encontrado.</div>';return}
    scroll.innerHTML=profs.map(p=>`<div class="likes-list-item"><img src="${p.avatar||''}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent((p.username||'?').slice(0,2))}&background=4bb4f2&color=fff&size=64'" alt="${p.username||''}"><span class="lname">${p.username||'Usuário'}</span></div>`).join('')
  }catch(e){scroll.innerHTML='<div class="likes-list-empty">Erro ao carregar curtidas.</div>'}
}
window.closeLikesList = () => { document.getElementById('likes-list-overlay').classList.remove('open') }
window.closeLikesListOutside = (e) => { if(e.target===document.getElementById('likes-list-overlay'))closeLikesList() }

window.toggleLike = async(e, id, isVideo) => {
  e?.stopPropagation()
  if(!currentUser){alert('Faça login para curtir');return}
  if(lockingLikes.has(id))return
  lockingLikes.add(id)
  try{
    const btn=document.getElementById(`btn-like-${id}`),liked=btn.classList.contains('liked'),els=document.querySelectorAll(`.lc[data-id="${id}"]`),newN=(parseInt(els[0]?.textContent||0))+(liked?-1:1)
    btn.innerHTML=`<span>${!liked?'❤️':'\u2661'}</span><span class="lc" data-id="${id}">${newN}</span>`
    btn.classList.toggle('liked',!liked)
    els.forEach(el=>el.textContent=newN)
    const{data:ex}=await supabase.from('likes').select('id').eq('post_id',id).eq('user_id',currentUser.id).maybeSingle()
    if(ex)await supabase.from('likes').delete().eq('id',ex.id)
    else await supabase.from('likes').insert({post_id:id,user_id:currentUser.id})
    setTimeout(()=>syncInteractionsQuiet(id,isVideo),800)
  }catch(err){console.error('Erro like:',err)}
  lockingLikes.delete(id)
}

window.submitComment = async(id, isVideo) => {
  const input=document.getElementById(`mi-${id}`),text=input?.value.trim()
  if(!text){alert('Escreva algo para comentar');return}
  if(!currentUser){alert('Faça login para comentar');return}
  try{input.value='';await supabase.from('comments').insert({post_id:id,user_id:currentUser.id,content:text});setTimeout(()=>syncInteractions(id,isVideo),300)}catch(err){alert('Erro ao enviar comentário')}
}

window.deleteComment = async(commentId, postId, isVideo) => {
  if(!currentUser)return
  await supabase.from('comments').delete().eq('id',commentId).eq('user_id',currentUser.id)
  syncInteractions(postId,isVideo)
}

window.openLogoModal = () => { document.getElementById('logo-modal').classList.add('open'); document.body.style.overflow='hidden' }
window.closeLogoModal = () => { document.getElementById('logo-modal').classList.remove('open'); document.body.style.overflow='' }

setTimeout(()=>{const l=document.getElementById('loader');if(l&&l.style.display!=='none'){l.classList.add('hidden');setTimeout(()=>l.style.display='none',350)}},6000)
supabase.auth.getSession().then(({data:{session}})=>{updateAuthUI(session?.user||null);loadContent()})
supabase.auth.onAuthStateChange((_,s)=>{updateAuthUI(s?.user||null);loadContent()})
