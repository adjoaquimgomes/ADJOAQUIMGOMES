<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>CONJOSSAD 2026 - Fotos e Vídeos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a227; --dark-gold: #6d4c00; --orange: #ff5a00; --ig-red: #ed4956; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f6f4ef; color: #333; overflow-x: hidden; }
        header { background: linear-gradient(135deg, var(--dark-gold), var(--gold)); padding: 15px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; max-width: 1400px; margin: 0 auto; }
        .brand { display: flex; align-items: center; gap: 12px; color: white; text-decoration: none; }
        .brand img { height: 55px; border-radius: 10px; }
        .brand span { font-family: 'Cinzel', serif; font-weight: 900; font-size: 21px; }
        .nav-links a { color: white; margin-left: 25px; text-decoration: none; font-weight: 600; transition: .3s; }
        .nav-links a:hover { color: var(--orange); }
        #auth-area { display: flex; align-items: center; gap: 12px; color: white; }
        #auth-area img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        #auth-area button { padding: 6px 14px; background: #ff5a00; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: .3s; }
        #auth-area button:hover { background: white; color: #ff5a00; }
        main { padding: 40px 20px; max-width: 1400px; margin: 0 auto; min-height: 80vh; }
        h1 { text-align: center; font-family: 'Cinzel', serif; color: var(--dark-gold); margin-bottom: 30px; font-size: 2.8rem; }
        .stories-container { display: flex; overflow-x: auto; gap: 20px; padding: 20px 0; scrollbar-width: thin; scrollbar-color: var(--gold) #ddd; }
        .story-card { flex: 0 0 320px; height: 540px; border-radius: 20px; overflow: hidden; position: relative; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .story-media-container { width: 100%; height: 60%; display: flex; align-items: center; justify-content: center; background: #111; position: relative; }
        .story-media { max-width: 100%; max-height: 100%; object-fit: contain; }
        .story-overlay { position: absolute; top: 0; left: 0; right: 0; height: 100%; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.8)); display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; color: white; pointer-events: none; }
        .story-author { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .story-actions { display: flex; gap: 15px; align-items: center; pointer-events: auto; }
        .like-btn, .comment-btn { background: none; border: none; font-size: 26px; color: white; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: transform 0.2s; }
        .like-btn span, .comment-btn span { font-size: 1rem; font-weight: 600; }
        .like-btn.liked { color: var(--ig-red); }
        .like-btn.animate { animation: pop 0.4s ease; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .interactions-section { height: 40%; background: white; display: flex; flex-direction: column; }
        .likes-info { padding: 10px 15px; border-bottom: 1px solid #eee; font-size: 0.8rem; cursor: pointer; color: #555; min-height: 35px; }
        .likes-info b { color: var(--dark-gold); }
        .comment-section { flex: 1; overflow-y: auto; padding: 10px 15px; background: #fff; }
        .comment { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
        .comment-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .comment-username { font-weight: 700; font-size: 0.8rem; color: #333; }
        .comment-text { font-size: 0.8rem; color: #444; margin-top: 1px; line-height: 1.3; }
        .comment-input { display: flex; gap: 8px; padding: 10px 15px; border-top: 1px solid #eee; background: #fdfdfd; }
        .comment-input input { flex: 1; padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 0.8rem; outline: none; transition: border 0.3s; }
        .comment-input input:focus { border-color: var(--gold); }
        .comment-input button { padding: 6px 15px; background: var(--gold); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.3s; }
        .comment-input button:hover { background: var(--dark-gold); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 15px; padding: 25px; max-width: 400px; width: 90%; max-height: 500px; overflow-y: auto; position: relative; }
        .modal-header { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; color: var(--dark-gold); text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 28px; cursor: pointer; color: #999; }
        .liker-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .liker-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .liker-name { font-weight: 600; color: #333; font-size: 0.95rem; }
        .loading-overlay { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="spinner"></div>
</div>

<header>
    <div class="nav">
        <a href="index.html" class="brand">
            <img src="AD JOAQUIM GOMES.png" alt="Logo">
            <span>ASSEMBLEIA DE DEUS JG</span>
        </a>
        <div class="nav-links">
            <a href="index.html#inicio">Início</a>
            <a href="index.html#eventos">Eventos</a>
        </div>
        <div id="auth-area"></div>
    </div>
</header>

<main>
    <h1>CONJOSSAD 2026</h1>
    <div class="stories-container" id="stories-feed"></div>
    <div id="login-msg" style="text-align:center; color:#888; margin-top:30px; display:none;">
        <p>Faça login para interagir com as fotos e vídeos do congresso.</p>
    </div>
</main>

<div class="modal" id="likes-modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeLikesModal()">✕</button>
        <div class="modal-header">Curtidas</div>
        <div id="likes-list"></div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

// CONFIGURAÇÃO SUPABASE
const supabase = createClient(
    'https://qkhfktmvfgjuwscsmpos.supabase.co',  // ← URL NOVA do projeto
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFraGZrdG12ZmdqdXdzY3NtcG9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIwMTIsImV4cCI6MjA4NzQyODAxMn0.2qd4vXCihGs5zZAppc71r-U1BAagzBnMgZZN_N5pwH8'  // ← anon key que você mandou
)

const authArea = document.getElementById('auth-area'), 
      storiesFeed = document.getElementById('stories-feed'),
      loginMsg = document.getElementById('login-msg'),
      loader = document.getElementById('loader');

let currentUser = null;
let lockingLikes = new Set(); 

// FUNÇÕES DE AUTH
window.login = () => supabase.auth.signInWithOAuth({ 
    provider: 'google', 
    options: { redirectTo: window.location.href.split('?')[0] } 
});

window.logout = async () => {
    await supabase.auth.signOut();
    localStorage.clear();
    location.reload();
};

async function updateAuthUI(user) {
    if (user) {
        currentUser = user;
        // Garantir perfil na tabela 'profiles'
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
        if (!profile) {
            await supabase.from('profiles').upsert({
                id: user.id,
                username: user.user_metadata.full_name || user.email.split('@')[0],
                avatar: user.user_metadata.avatar_url || 'https://via.placeholder.com/36'
            });
        }
        
        const avatar = profile?.avatar || user.user_metadata.avatar_url;
        const name = profile?.username || user.user_metadata.full_name;
        
        authArea.innerHTML = `<img src="${avatar}" alt="User"><span>${name}</span><button onclick="logout()">Sair</button>`;
        loginMsg.style.display = 'none';
    } else {
        currentUser = null;
        authArea.innerHTML = `<button onclick="login()">Entrar com Google</button>`;
        loginMsg.style.display = 'block';
    }
    loadStories();
}

// CARREGAR STORIES
async function loadStories() {
    let { data: stories } = await supabase.from('media_posts').select('*').order('created_at', { ascending: false });
    
    if (!stories || stories.length === 0) {
        stories = [
            {id: '1', type: 'image', url: 'CONJOSSAD 2026/CONJOSSAD 2026 1.jpg', author: 'Equipe JG'}, 
            {id: '2', type: 'image', url: 'CONJOSSAD 2026/CONJOSSAD 2026 2.jpg', author: 'Equipe JG'}, 
            {id: '3', type: 'video', url: 'videos/conjossad-apresentacao.mp4', author: 'Ministério de Louvor'}
        ];
    }

    storiesFeed.innerHTML = '';
    stories.forEach(s => {
        const card = document.createElement('div'); 
        card.className = 'story-card';
        card.innerHTML = `
            <div class="story-media-container">
                ${s.type==='video' ? `<video class="story-media" muted loop playsinline><source src="${s.url}" type="video/mp4"></video>` : `<img class="story-media" src="${s.url}">`}
                <div class="story-overlay">
                    <div class="story-author">${s.author || 'Equipe JG'}</div>
                    <div class="story-actions">
                        <button class="like-btn" id="btn-like-${s.id}" onclick="toggleLike(event, '${s.id}')">♡ <span>0</span></button>
                        <button class="comment-btn">💬 <span id="comm-count-${s.id}">0</span></button>
                    </div>
                </div>
            </div>
            <div class="interactions-section">
                <div class="likes-info" id="likes-info-${s.id}" onclick="showLikesModal('${s.id}')"></div>
                <div class="comment-section" id="comments-${s.id}"></div>
                <div class="comment-input">
                    <input type="text" placeholder="Escreva um comentário..." id="in-${s.id}" onkeypress="if(event.key==='Enter') addComment('${s.id}')">
                    <button onclick="addComment('${s.id}')">Postar</button>
                </div>
            </div>
        `;
        storiesFeed.appendChild(card); 
        syncData(s.id);
    });
    
    setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }, 500);
}

// SINCRONIZAÇÃO DE DADOS
async function syncData(postId) {
    try {
        const { count: totalLikes } = await supabase.from('likes').select('*', { count: 'exact', head: true }).eq('post_id', postId);
        
        let jaCurti = false;
        if (currentUser) {
            const { data: myLike } = await supabase.from('likes').select('id').eq('post_id', postId).eq('user_id', currentUser.id).maybeSingle();
            jaCurti = !!myLike;
        }

        const btn = document.getElementById(`btn-like-${postId}`);
        if (btn) {
            btn.innerHTML = jaCurti ? `❤️ <span>${totalLikes || 0}</span>` : `♡ <span>${totalLikes || 0}</span>`;
            btn.classList.toggle('liked', jaCurti);
        }

        const likesInfo = document.getElementById(`likes-info-${postId}`);
        if (likesInfo) {
            if (totalLikes > 0) {
                const { data: recentLikes } = await supabase.from('likes').select('profiles(username)').eq('post_id', postId).limit(1);
                const firstName = recentLikes?.[0]?.profiles?.username || 'Alguém';
                likesInfo.innerHTML = totalLikes === 1 ? `Curtido por <b>${firstName}</b>` : `Curtido por <b>${firstName}</b> e <b>outras ${totalLikes-1} pessoas</b>`;
            } else {
                likesInfo.innerHTML = 'Seja o primeiro a curtir';
            }
        }

        const { data: comms } = await supabase.from('comments').select('*, profiles(username, avatar)').eq('post_id', postId).order('created_at', { ascending: true });
        const commSection = document.getElementById(`comments-${postId}`);
        if (commSection) {
            commSection.innerHTML = comms?.map(c => `
                <div class="comment">
                    <img src="${c.profiles?.avatar || 'https://via.placeholder.com/26'}" class="comment-avatar">
                    <div class="comment-content">
                        <span class="comment-username">${c.profiles?.username || 'Anônimo'}</span>
                        <span class="comment-text">${c.content}</span>
                    </div>
                </div>
            `).join('') || '';
        }
        
        const countSpan = document.getElementById(`comm-count-${postId}`);
        if (countSpan) countSpan.textContent = comms?.length || 0;

    } catch (e) { console.error('Sync Error:', e); }
}

// LÓGICA DE LIKE (INSTAGRAM STYLE)
window.toggleLike = async (event, postId) => {
    if (event) event.stopPropagation();
    if (!currentUser) return alert('Faça login com o Google para curtir!');
    if (lockingLikes.has(postId)) return;
    
    lockingLikes.add(postId);
    const btn = document.getElementById(`btn-like-${postId}`);
    const isLiked = btn.classList.contains('liked');
    const span = btn.querySelector('span');
    let currentCount = parseInt(span.textContent) || 0;

    // UI OPTIMISTIC UPDATE
    if (isLiked) {
        btn.classList.remove('liked');
        btn.innerHTML = `♡ <span>${Math.max(0, currentCount - 1)}</span>`;
    } else {
        btn.classList.add('liked', 'animate');
        btn.innerHTML = `❤️ <span>${currentCount + 1}</span>`;
        setTimeout(() => btn.classList.remove('animate'), 400);
    }

    try {
        if (isLiked) {
            await supabase.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
        } else {
            await supabase.from('likes').insert({ post_id: postId, user_id: currentUser.id });
        }
    } catch (err) {
        console.error('Like Error:', err);
    } finally {
        await syncData(postId); 
        setTimeout(() => lockingLikes.delete(postId), 300);
    }
};

// LÓGICA DE COMENTÁRIO
window.addComment = async (postId) => {
    const input = document.getElementById(`in-${postId}`);
    const text = input.value.trim();
    if (!text || !currentUser) return;
    
    const btn = input.nextElementSibling;
    btn.disabled = true;

    try {
        const { error } = await supabase.from('comments').insert({ 
            post_id: postId, 
            user_id: currentUser.id, 
            content: text 
        });
        
        if (error) throw error;
        input.value = '';
        await syncData(postId);
    } catch (err) {
        console.error('Comment Error:', err);
        alert('Erro ao enviar comentário. Verifique se o banco de dados aceita o ID deste post.');
    } finally {
        btn.disabled = false;
    }
};

// MODAL DE CURTIDAS
window.showLikesModal = async (postId) => {
    const { data: likes } = await supabase.from('likes').select('profiles(username, avatar)').eq('post_id', postId);
    const list = document.getElementById('likes-list');
    list.innerHTML = likes?.map(l => `
        <div class="liker-item">
            <img src="${l.profiles?.avatar || 'https://via.placeholder.com/42'}" class="liker-avatar">
            <span class="liker-name">${l.profiles?.username || 'Usuário'}</span>
        </div>
    `).join('') || '<p style="text-align:center; color:#999; padding:20px;">Nenhuma curtida ainda.</p>';
    document.getElementById('likes-modal').classList.add('active');
};

window.closeLikesModal = () => document.getElementById('likes-modal').classList.remove('active');

// INICIALIZAÇÃO
document.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await supabase.auth.getSession();
    updateAuthUI(session?.user || null);
    
    supabase.auth.onAuthStateChange((_event, session) => {
        updateAuthUI(session?.user || null);
    });
});
</script>
</body>
</html>
